<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Dobrodružství Malé Lišky</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Fredoka+One&display=swap');

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #87CEEB; /* Jasně modré nebe */
            overflow: hidden;
            font-family: 'Fredoka One', cursive, sans-serif;
            touch-action: none; /* Zakáže přibližování a scrollování na dotyk */
            user-select: none;
            -webkit-user-select: none;
        }

        #game-container {
            position: relative;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
        }

        /* UI Nahoře - Životy a Inventář */
        #top-ui {
            position: absolute;
            top: 10px;
            left: 10px;
            right: 10px;
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            z-index: 10;
            pointer-events: none; /* Aby šlo ťapat na plátno pod tím */
        }

        #hearts {
            font-size: 30px;
            text-shadow: 2px 2px 0 #000;
        }

        #inventory {
            display: flex;
            gap: 10px;
            pointer-events: auto; /* Inventář musí reagovat na dotyk */
        }

        .inv-slot {
            width: 50px;
            height: 50px;
            background-color: rgba(255, 255, 255, 0.7);
            border: 4px solid #8B4513;
            border-radius: 10px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 30px;
            box-shadow: 0 4px 0 #5C2E0B;
            cursor: pointer;
            transition: transform 0.1s;
        }

        .inv-slot:active {
            transform: translateY(4px);
            box-shadow: 0 0 0 #5C2E0B;
        }

        .inv-slot img {
            width: 80%;
            height: 80%;
        }

        /* Zprávy pro hráče */
        #message-box {
            position: absolute;
            top: 80px;
            width: 100%;
            text-align: center;
            font-size: 24px;
            color: white;
            text-shadow: 2px 2px 4px #000;
            opacity: 0;
            transition: opacity 0.3s;
            pointer-events: none;
            z-index: 20;
        }

        /* Herní plátno */
        canvas {
            flex-grow: 1;
            width: 100%;
            height: 100%;
            display: block;
        }

        /* Ovládání dole */
        #controls {
            position: absolute;
            bottom: 20px;
            left: 20px;
            display: flex;
            gap: 20px;
            z-index: 10;
            pointer-events: auto;
        }

        .btn {
            width: 70px;
            height: 70px;
            background-color: rgba(255, 255, 255, 0.8);
            border: 4px solid #333;
            border-radius: 50%;
            font-size: 30px;
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: 0 6px 0 #333;
            cursor: pointer;
            user-select: none;
        }

        .btn:active {
            transform: translateY(6px);
            box-shadow: 0 0 0 #333;
            background-color: #ddd;
        }

        #win-screen {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.8);
            color: white;
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 100;
        }
        #win-screen h1 { font-size: 50px; margin: 10px; color: #FFD700; }
        #win-screen p { font-size: 24px; }
        #win-screen button {
            margin-top: 20px;
            padding: 15px 30px;
            font-size: 24px;
            font-family: inherit;
            background: #4CAF50;
            color: white;
            border: none;
            border-radius: 10px;
            cursor: pointer;
        }

    </style>
</head>
<body>

<div id="game-container">
    <div id="top-ui">
        <div id="hearts">❤️❤️❤️</div>
        <div id="inventory">
            <div class="inv-slot" id="slot-1" onclick="useItem(0)"></div>
            <div class="inv-slot" id="slot-2" onclick="useItem(1)"></div>
        </div>
    </div>
    
    <div id="message-box">Tady je zpráva!</div>

    <!-- Plátno zabírá zbytek místa a ťapnutí na něj znamená SKOK -->
    <canvas id="gameCanvas"></canvas>

    <div id="controls">
        <div class="btn" id="btnLeft">⬅️</div>
        <div class="btn" id="btnRight">➡️</div>
    </div>

    <div id="win-screen">
        <h1>Vyhráli jste! 🦊🎉</h1>
        <p>Liška dostala svou zmrzlinu!</p>
        <div style="font-size: 80px;">🍦</div>
        <button onclick="location.reload()">Hrát znovu</button>
    </div>
</div>

<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    
    // Interní rozlišení pro logiku, canvas se roztáhne přes CSS
    const GAME_WIDTH = 1000;
    const GAME_HEIGHT = 500;
    
    let scaleX = 1;
    let scaleY = 1;

    function resizeCanvas() {
        canvas.width = GAME_WIDTH;
        canvas.height = GAME_HEIGHT;
    }
    window.addEventListener('resize', resizeCanvas);
    resizeCanvas();

    // Proměnné hry
    let lives = 3;
    let inventory = [];
    let cameraX = 0;
    let frameCount = 0;
    let isGameOver = false;

    // Tlačítka
    const keys = { left: false, right: false, jump: false };

    // Ovládání dotykem i myší
    const btnLeft = document.getElementById('btnLeft');
    const btnRight = document.getElementById('btnRight');

    function bindButton(btn, keyName) {
        btn.addEventListener('touchstart', (e) => { e.preventDefault(); keys[keyName] = true; });
        btn.addEventListener('touchend', (e) => { e.preventDefault(); keys[keyName] = false; });
        btn.addEventListener('mousedown', (e) => { e.preventDefault(); keys[keyName] = true; });
        btn.addEventListener('mouseup', (e) => { e.preventDefault(); keys[keyName] = false; });
        btn.addEventListener('mouseleave', (e) => { keys[keyName] = false; });
    }
    
    bindButton(btnLeft, 'left');
    bindButton(btnRight, 'right');

    // Skok - ťapnutí na plátno
    canvas.addEventListener('touchstart', (e) => { e.preventDefault(); keys.jump = true; });
    canvas.addEventListener('mousedown', (e) => { e.preventDefault(); keys.jump = true; });

    // Hráč - Liška
    const player = {
        x: 100,
        y: 300,
        w: 40,
        h: 40,
        vx: 0,
        vy: 0,
        speed: 6,
        jumpForce: -13,
        gravity: 0.6,
        grounded: false,
        facingRight: true,
        spawnX: 100,
        spawnY: 300
    };

    // Mapa hry - Překážky, věci
    let blocks = [];
    let entities = [];

    function initLevel() {
        blocks = [
            // Zem na začátku
            { x: -500, y: 450, w: 1000, h: 100, type: 'ground' },
            
            // Díra s ostny (země končí, jsou ostny, pak zase země)
            { x: 500, y: 430, w: 150, h: 20, type: 'spikes' },
            { x: 650, y: 450, w: 400, h: 100, type: 'ground' },

            // Dvě bedny na sobě
            { x: 800, y: 390, w: 60, h: 60, type: 'box' },
            { x: 800, y: 330, w: 60, h: 60, type: 'box' },

            // Země dál
            { x: 1050, y: 450, w: 1000, h: 100, type: 'ground' },

            // Kopec, který musí přelézt (schodovitý)
            { x: 1400, y: 390, w: 60, h: 60, type: 'dirt' },
            { x: 1460, y: 330, w: 60, h: 120, type: 'dirt' },
            // Tento kus kopce se dá vykopat krumpáčem a skrývá klíč!
            { x: 1520, y: 270, w: 80, h: 180, type: 'dirt_diggable', id: 'hill_core' },
            { x: 1600, y: 330, w: 60, h: 120, type: 'dirt' },
            { x: 1660, y: 390, w: 60, h: 60, type: 'dirt' },

            // Propast před trampolínou (žádná země)
            // Trampolína
            { x: 2050, y: 450, w: 80, h: 30, type: 'trampoline' },

            // Ostrůvek s banánem nahoře
            { x: 2150, y: 150, w: 100, h: 50, type: 'ground' }, // Plošinka z trampolíny
            
            // Zem dole za trampolínou
            { x: 2200, y: 450, w: 1500, h: 100, type: 'ground' },

            // Klec na konci (na zemi)
            { x: 3000, y: 250, w: 100, h: 200, type: 'cage', id: 'final_cage' }
        ];

        entities = [
            { x: 1200, y: 400, w: 40, h: 40, type: 'pickaxe', collected: false },
            { x: 3030, y: 350, w: 40, h: 40, type: 'icecream', collected: false, insideCage: true }
        ];
    }

    // Zprávy UI
    let messageTimeout;
    function showMessage(msg) {
        const box = document.getElementById('message-box');
        box.innerText = msg;
        box.style.opacity = 1;
        clearTimeout(messageTimeout);
        messageTimeout = setTimeout(() => {
            box.style.opacity = 0;
        }, 3000);
    }

    function updateHearts() {
        let str = "";
        for(let i=0; i<3; i++) {
            str += i < lives ? "❤️" : "🖤";
        }
        document.getElementById('hearts').innerText = str;
        if(lives <= 0) {
            showMessage("Jejda! Zkus to znovu z checkpointu.");
            lives = 3;
            updateHearts();
        }
    }

    function updateInventory() {
        for(let i=0; i<2; i++) {
            const slot = document.getElementById(`slot-${i+1}`);
            if (inventory[i]) {
                if (inventory[i] === 'pickaxe') slot.innerText = "⛏️";
                if (inventory[i] === 'key') slot.innerText = "🗝️";
            } else {
                slot.innerText = "";
            }
        }
    }

    // Ťapnutí na předmět v inventáři (Minecraft styl)
    window.useItem = function(index) {
        const item = inventory[index];
        if (!item) return;

        if (item === 'pickaxe') {
            // Najdi nejbližší vykopatelný blok
            let target = blocks.find(b => b.type === 'dirt_diggable');
            if (target && Math.abs((player.x + player.w/2) - (target.x + target.w/2)) < 150) {
                // Vykopej blok!
                target.type = 'air'; 
                showMessage("Vykopala jsi klíč!");
                // Spawn klíč přesně tam, kde byl blok
                entities.push({ x: target.x + 20, y: target.y + 100, w: 40, h: 40, type: 'key', collected: false });
            } else {
                showMessage("Tady není co kopat. Běž k tomu velkému kopci!");
            }
        } 
        else if (item === 'key') {
            // Najdi klec
            let cage = blocks.find(b => b.type === 'cage');
            if (cage && Math.abs((player.x + player.w/2) - (cage.x + cage.w/2)) < 150) {
                cage.type = 'air'; // Klec zmizí
                showMessage("Klec je odemčená!");
                let icecream = entities.find(e => e.type === 'icecream');
                if (icecream) icecream.insideCage = false;
                
                // Klíč se použil, můžeme ho zahodit
                inventory.splice(index, 1);
                updateInventory();
            } else {
                showMessage("Musíš přijít blíž ke kleci se zámkem.");
            }
        }
    }

    function die() {
        lives--;
        updateHearts();
        player.x = player.spawnX;
        player.y = player.spawnY;
        player.vx = 0;
        player.vy = 0;
    }

    // --- Fyzika a Logika ---
    function update() {
        if(isGameOver) return;
        frameCount++;

        // Pohyb doleva/doprava
        if (keys.left) {
            player.vx = -player.speed;
            player.facingRight = false;
        } else if (keys.right) {
            player.vx = player.speed;
            player.facingRight = true;
        } else {
            player.vx = 0;
        }

        // Skok
        if (keys.jump) {
            if (player.grounded) {
                player.vy = player.jumpForce;
                player.grounded = false;
            }
            keys.jump = false; // resetujeme tlapnutí
        }

        // Gravitace
        player.vy += player.gravity;
        if(player.vy > 15) player.vy = 15; // terminální rychlost

        // Uložení staré pozice pro kolize
        let oldX = player.x;
        let oldY = player.y;

        // Pohyb po X
        player.x += player.vx;
        player.grounded = false;

        // --- Speciální banánová skluzavka (Šikmá plocha) ---
        // Banán začíná na x=2250, y=150 a končí na x=2700, y=450
        let bananaStartX = 2250, bananaStartY = 150;
        let bananaEndX = 2700, bananaEndY = 450;
        let onBanana = false;

        if (player.x + player.w > bananaStartX && player.x < bananaEndX) {
            // Výpočet výšky banánu v bodě X hráče (lineární rovnice)
            let progress = (player.x + player.w/2 - bananaStartX) / (bananaEndX - bananaStartX);
            let surfaceY = bananaStartY + progress * (bananaEndY - bananaStartY);
            
            // Pokud je hráč nad banánem a padá na něj
            if (player.y + player.h >= surfaceY - 20 && player.y + player.h <= surfaceY + 30) {
                player.y = surfaceY - player.h;
                player.vy = 0;
                player.grounded = true;
                player.vx += 4; // Zrychlení dolů (Sklouznutí!)
                onBanana = true;
            }
        }

        // Kolize s boxy (AABB)
        for (let b of blocks) {
            if (b.type === 'air' || b.type === 'spikes' || b.type === 'trampoline') continue;

            if (player.x < b.x + b.w && player.x + player.w > b.x &&
                player.y < b.y + b.h && player.y + player.h > b.y) {
                
                // Kolize po X
                if (oldX + player.w <= b.x) { // Zleva
                    player.x = b.x - player.w;
                } else if (oldX >= b.x + b.w) { // Zprava
                    player.x = b.x + b.w;
                }
            }
        }

        // Pohyb po Y
        if(!onBanana) {
            player.y += player.vy;
        }

        // Kolize s boxy po Y
        for (let b of blocks) {
            if (b.type === 'air') continue;

            if (player.x < b.x + b.w && player.x + player.w > b.x &&
                player.y < b.y + b.h && player.y + player.h > b.y) {
                
                if (b.type === 'spikes') {
                    die();
                    return;
                }

                if (b.type === 'trampoline') {
                    // Odraz zespoda nahoru
                    if (player.vy > 0 && oldY + player.h <= b.y + 10) {
                        player.y = b.y - player.h;
                        player.vy = player.jumpForce * 1.6; // Supr skok!
                        player.grounded = false;
                        showMessage("Boing!");
                    }
                    continue;
                }

                // Běžný blok (Ground, Box, Dirt, Cage)
                if (player.vy > 0 && oldY + player.h <= b.y + 10) { // Dopad shora
                    player.grounded = true;
                    player.vy = 0;
                    player.y = b.y - player.h;
                } else if (player.vy < 0 && oldY >= b.y + b.h - 10) { // Náraz zespoda
                    player.vy = 0;
                    player.y = b.y + b.h;
                }
            }
        }

        // Padání do prázdna
        if (player.y > 700) {
            die();
        }

        // Sbírání věcí
        for (let e of entities) {
            if (!e.collected && 
                player.x < e.x + e.w && player.x + player.w > e.x &&
                player.y < e.y + e.h && player.y + player.h > e.y) {
                
                if (e.type === 'pickaxe' && inventory.length < 2) {
                    e.collected = true;
                    inventory.push('pickaxe');
                    updateInventory();
                    showMessage("Sebrala jsi Krumpáč! Ťapni na něj nahoře, až budeš u kopce.");
                    player.spawnX = e.x - 100; // Checkpoint
                    player.spawnY = 100;
                }

                if (e.type === 'key' && inventory.length < 2) {
                    e.collected = true;
                    inventory.push('key');
                    updateInventory();
                    showMessage("Máš klíč! Uteč ke kleci a odemkni ji ťapnutím na klíč nahoře.");
                }

                if (e.type === 'icecream') {
                    if (e.insideCage) {
                        // Koliduje s klecí, nelze sebrat dokud nezmizí (což ošetřuje fyzika klece, ale pro jistotu)
                    } else {
                        e.collected = true;
                        isGameOver = true;
                        document.getElementById('win-screen').style.display = 'flex';
                    }
                }
            }
        }

        // Posuv kamery, aby byla Liška uprostřed
        cameraX = player.x - GAME_WIDTH / 2.5;
        if(cameraX < 0) cameraX = 0;
    }

    // --- Kreslení (Grafika) ---
    function draw() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        
        ctx.save();
        ctx.translate(-cameraX, 0);

        // Vykreslení mapy
        for (let b of blocks) {
            if (b.type === 'air') continue;

            if (b.type === 'ground' || b.type === 'dirt' || b.type === 'dirt_diggable') {
                ctx.fillStyle = '#654321'; // Hnědá hlína
                ctx.fillRect(b.x, b.y, b.w, b.h);
                ctx.fillStyle = '#4CAF50'; // Zelená tráva nahoře
                ctx.fillRect(b.x, b.y, b.w, 15);
                
                if(b.type === 'dirt_diggable') {
                    // Naznačit, že tu něco je (praskliny)
                    ctx.strokeStyle = '#3E2723';
                    ctx.lineWidth = 2;
                    ctx.beginPath();
                    ctx.moveTo(b.x + 20, b.y + 20); ctx.lineTo(b.x + 40, b.y + 50);
                    ctx.moveTo(b.x + 60, b.y + 40); ctx.lineTo(b.x + 40, b.y + 80);
                    ctx.stroke();
                }
            }
            
            if (b.type === 'box') {
                ctx.fillStyle = '#D2B48C';
                ctx.fillRect(b.x, b.y, b.w, b.h);
                ctx.strokeStyle = '#8B4513';
                ctx.lineWidth = 4;
                ctx.strokeRect(b.x, b.y, b.w, b.h);
                ctx.beginPath();
                ctx.moveTo(b.x, b.y); ctx.lineTo(b.x + b.w, b.y + b.h);
                ctx.moveTo(b.x + b.w, b.y); ctx.lineTo(b.x, b.y + b.h);
                ctx.stroke();
            }

            if (b.type === 'spikes') {
                ctx.fillStyle = '#aaa';
                for(let i=0; i < b.w; i+=20) {
                    ctx.beginPath();
                    ctx.moveTo(b.x + i, b.y + b.h);
                    ctx.lineTo(b.x + i + 10, b.y);
                    ctx.lineTo(b.x + i + 20, b.y + b.h);
                    ctx.fill();
                }
            }

            if (b.type === 'trampoline') {
                ctx.fillStyle = '#333'; // základna
                ctx.fillRect(b.x, b.y + 15, b.w, 15);
                ctx.fillStyle = '#1E90FF'; // pružná plocha
                ctx.fillRect(b.x, b.y, b.w, 15);
                // Pérka
                ctx.strokeStyle = 'silver';
                ctx.beginPath();
                for(let i=10; i<b.w; i+=15) {
                    ctx.moveTo(b.x+i, b.y); ctx.lineTo(b.x+i, b.y+15);
                }
                ctx.stroke();
            }

            if (b.type === 'cage') {
                ctx.fillStyle = '#555';
                ctx.fillRect(b.x, b.y, b.w, b.h); // Pozadí klece
                ctx.fillStyle = '#333';
                // Mříže
                for(let i=10; i<b.w; i+=20) {
                    ctx.fillRect(b.x + i, b.y, 5, b.h);
                }
                ctx.fillRect(b.x, b.y, b.w, 10); // horní
                ctx.fillRect(b.x, b.y + b.h - 10, b.w, 10); // dolní
                // Zámek uprostřed
                ctx.font = "40px Arial";
                ctx.fillText("🔒", b.x + b.w/2 - 20, b.y + b.h/2 + 15);
            }
        }

        // Vykreslení velkého banánu (Skluzavky)
        // Banán: od 2250,150 do 2700,450
        ctx.fillStyle = '#FFD700'; // Zlatá žlutá
        ctx.beginPath();
        ctx.moveTo(2250, 150);
        ctx.quadraticCurveTo(2400, 450, 2700, 450);
        ctx.lineTo(2700, 480);
        ctx.quadraticCurveTo(2400, 480, 2220, 180);
        ctx.fill();
        ctx.strokeStyle = '#DAA520'; // Stín na banánu
        ctx.lineWidth = 5;
        ctx.stroke();

        // Vykreslení entit (věcí)
        ctx.font = "40px Arial";
        for (let e of entities) {
            if (!e.collected) {
                // Skákací animace pro věci
                let bob = Math.sin(frameCount * 0.1) * 5;
                if (e.type === 'pickaxe') ctx.fillText("⛏️", e.x, e.y + 35 + bob);
                if (e.type === 'key') ctx.fillText("🗝️", e.x, e.y + 35 + bob);
                if (e.type === 'icecream') ctx.fillText("🍦", e.x, e.y + 35);
            }
        }

        // Vykreslení LIŠKY
        drawFox(player.x, player.y, player.facingRight, Math.abs(player.vx) > 0);

        ctx.restore();
    }

    // Speciální funkce pro nakreslení roztomilé lišky
    function drawFox(x, y, facingRight, isRunning) {
        ctx.save();
        ctx.translate(x + 20, y + 20); // Střed lišky
        if (!facingRight) {
            ctx.scale(-1, 1); // Zrcadlové převrácení doleva
        }

        const foxOrange = '#FF7F00';
        const foxWhite = '#FFFFFF';
        
        // Animace nožiček a ocásku
        let walkCycle = isRunning ? Math.sin(frameCount * 0.3) : 0;
        let tailWag = Math.cos(frameCount * 0.1) * 0.2;

        // Ocas (Vzadu)
        ctx.save();
        ctx.translate(-15, 5);
        ctx.rotate(tailWag - 0.5);
        ctx.fillStyle = foxOrange;
        ctx.beginPath();
        ctx.ellipse(-10, 0, 15, 8, 0, 0, Math.PI * 2);
        ctx.fill();
        // Špička ocasu (bílá)
        ctx.fillStyle = foxWhite;
        ctx.beginPath();
        ctx.ellipse(-20, 0, 5, 6, 0, 0, Math.PI * 2);
        ctx.fill();
        ctx.restore();

        // Tělo
        ctx.fillStyle = foxOrange;
        ctx.beginPath();
        ctx.roundRect(-15, -10, 30, 20, 10);
        ctx.fill();

        // Bříško (bílé)
        ctx.fillStyle = foxWhite;
        ctx.beginPath();
        ctx.roundRect(-5, 0, 20, 10, 5);
        ctx.fill();

        // Nohy
        ctx.fillStyle = '#000'; // Černé tlapičky
        ctx.fillRect(-10 + walkCycle*5, 10, 6, 10); // Levá
        ctx.fillRect(5 - walkCycle*5, 10, 6, 10);  // Pravá

        // Hlava
        ctx.fillStyle = foxOrange;
        ctx.beginPath();
        ctx.arc(10, -10, 12, 0, Math.PI * 2);
        ctx.fill();

        // Uši
        ctx.beginPath();
        ctx.moveTo(5, -20); ctx.lineTo(0, -30); ctx.lineTo(10, -20);
        ctx.fill();
        ctx.beginPath();
        ctx.moveTo(15, -18); ctx.lineTo(18, -28); ctx.lineTo(20, -15);
        ctx.fill();

        // Čumáček (Bílý se špičkou)
        ctx.fillStyle = foxWhite;
        ctx.beginPath();
        ctx.arc(18, -5, 6, 0, Math.PI * 2);
        ctx.fill();
        ctx.fillStyle = '#000'; // Nos
        ctx.beginPath();
        ctx.arc(23, -6, 3, 0, Math.PI * 2);
        ctx.fill();

        // Oko
        ctx.fillStyle = '#000';
        ctx.beginPath();
        ctx.arc(12, -12, 2.5, 0, Math.PI * 2);
        ctx.fill();

        ctx.restore();
    }

    // Hlavní herní smyčka
    function gameLoop() {
        update();
        draw();
        requestAnimationFrame(gameLoop);
    }

    // Start Hry
    initLevel();
    updateHearts();
    updateInventory();
    
    // Prvotní zpráva
    setTimeout(() => {
        showMessage("Vydej se doprava! Ťapnutím na obrazovku skáčeš.");
    }, 1000);

    gameLoop();

</script>
</body>
</html>
