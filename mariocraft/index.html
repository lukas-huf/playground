<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Můj Dobrodružný Svět</title>
    
    <!-- Tailwind CSS pro stylování -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- React a ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    
    <!-- Babel pro překlad React kódu (JSX) v prohlížeči -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
        /* Zabráníme posouvání stránky při hraní na mobilu */
        body { overscroll-behavior: none; overflow: hidden; }
        #root { height: 100vh; width: 100vw; }
        
        /* Animace chození pro Minecraft panáčky */
        @keyframes swingLegs {
            0% { transform: rotate(-30deg); }
            100% { transform: rotate(30deg); }
        }
        @keyframes swingArms {
            0% { transform: rotate(30deg); }
            100% { transform: rotate(-30deg); }
        }
        .is-walking .left-leg { animation: swingLegs 0.3s infinite alternate ease-in-out; }
        .is-walking .right-leg { animation: swingLegs 0.3s infinite alternate-reverse ease-in-out; }
        .is-walking .left-arm { animation: swingArms 0.3s infinite alternate ease-in-out; }
        .is-walking .right-arm { animation: swingArms 0.3s infinite alternate-reverse ease-in-out; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // Herní level - Dubový háj
        const LEVEL = {
          platforms: [
            { id: 1, x: 0, y: 700, w: 2000, h: 200, type: 'grass' }, // Země - posunutá úplně dolů
            { id: 2, x: 300, y: 620, w: 120, h: 20, type: 'dirt' },  // První plošinka
            { id: 3, x: 500, y: 540, w: 120, h: 20, type: 'dirt' },  // Druhá plošinka
            { id: 4, x: 750, y: 600, w: 150, h: 20, type: 'dirt' },
            { id: 5, x: 1000, y: 520, w: 100, h: 20, type: 'dirt' },
            { id: 6, x: 1250, y: 620, w: 150, h: 20, type: 'dirt' },
            { id: 7, x: 1550, y: 660, w: 200, h: 40, type: 'grass' }, // Plošina před dveřmi
          ],
          emeralds: [
            { id: 1, x: 350, y: 580, collected: false },
            { id: 2, x: 550, y: 500, collected: false },
            { id: 3, x: 800, y: 560, collected: false },
            { id: 4, x: 1030, y: 480, collected: false },
            { id: 5, x: 1300, y: 580, collected: false },
          ],
          door: { x: 1650, y: 560, w: 60, h: 100 }, // Dveře na konci levelu
          trees: [ // Duby na pozadí háje
            { id: 1, x: 150, y: 700 },
            { id: 2, x: 600, y: 700 },
            { id: 3, x: 900, y: 700 },
            { id: 4, x: 1400, y: 700 },
            { id: 5, x: 1850, y: 700 }
          ]
        };

        const App = () => {
          // Stav aplikace - co má hráč právě vybráno
          const [gameState, setGameState] = useState('character_select'); // 'character_select', 'shop', 'playing', 'won'
          const [character, setCharacter] = useState('steve');
          const [hat, setHat] = useState('none');
          const [shirt, setShirt] = useState('none');
          const [shoes, setShoes] = useState('none');
          // activeTab už v novém obchodě nepoužíváme, vše je vidět pod sebou

          // Databáze oblečení a postaviček
          const characters = [
            { id: 'steve', name: 'Steve', bgColor: 'bg-blue-100' },
            { id: 'alex', name: 'Alex', bgColor: 'bg-green-100' },
            { id: 'koala', name: 'Koala', bgColor: 'bg-gray-100' }
          ];

          const wardrobe = {
            hats: [
              { id: 'none', name: 'Bez klobouku', color: 'transparent', icon: '👤' },
              { id: 'iron_helmet', name: 'Železná helma', color: '#e2e2e2', icon: '⬜' },
              { id: 'gold_helmet', name: 'Zlatá helma', color: '#fcee4e', icon: '🟨' },
              { id: 'diamond_helmet', name: 'Diamant. helma', color: '#82d8d8', icon: '💎' },
              { id: 'leather_cap', name: 'Kožená čapka', color: '#8a5c32', icon: '🤠' },
              { id: 'flower_crown', name: 'Květinová koruna', color: '#ff99cc', icon: '🌸' },
              { id: 'top_hat', name: 'Černý cylindr', color: '#222222', icon: '🎩' }
            ],
            shirts: [
              { id: 'none', name: 'Základní', color: 'transparent', icon: '👕' },
              { id: 'iron_armor', name: 'Železné brnění', color: '#e2e2e2', icon: '⬜' },
              { id: 'gold_armor', name: 'Zlaté brnění', color: '#fcee4e', icon: '🟨' },
              { id: 'diamond_armor', name: 'Diamant. brnění', color: '#82d8d8', icon: '💎' },
              { id: 'leather_tunic', name: 'Kožená tunika', color: '#8a5c32', icon: '🟫' },
              { id: 'red_shirt', name: 'Červená bunda', color: '#ff3333', icon: '🔴' },
              { id: 'blue_jacket', name: 'Modrá bunda', color: '#3b82f6', icon: '🔵' },
              { id: 'green_sweater', name: 'Zelený svetr', color: '#22c55e', icon: '🟢' }
            ],
            shoes: [
              { id: 'none', name: 'Základní', color: 'transparent', icon: '👣' },
              { id: 'iron_boots', name: 'Železné boty', color: '#e2e2e2', icon: '⬜' },
              { id: 'gold_boots', name: 'Zlaté boty', color: '#fcee4e', icon: '🟨' },
              { id: 'diamond_boots', name: 'Diamantové boty', color: '#82d8d8', icon: '💎' },
              { id: 'leather_boots', name: 'Kožené boty', color: '#8a5c32', icon: '🥾' },
              { id: 'sneakers', name: 'Růžové tenisky', color: '#ff66b2', icon: '👟' },
              { id: 'black_shoes', name: 'Černé boty', color: '#222222', icon: '👞' }
            ]
          };

          // --- HERNÍ LOGIKA ---
          const [emeraldsCount, setEmeraldsCount] = useState(0);
          const playerRef = useRef({ x: 50, y: 600, vx: 0, vy: 0, w: 40, h: 60, isGrounded: false });
          const keysRef = useRef({ left: false, right: false, up: false });
          const emeraldsRef = useRef([]);
          const scoreRef = useRef(0);
          const requestRef = useRef();
          const worldRef = useRef(null);
          const playerDOMRef = useRef(null);

          const gameLoop = () => {
            if (gameState !== 'playing') return;

            const p = playerRef.current;
            const jumpForce = -12;
            const gravity = 0.6;   
            const friction = 0.8;  

            if (keysRef.current.left) p.vx -= 1.5;
            if (keysRef.current.right) p.vx += 1.5;
            p.vx *= friction;
            p.vy += gravity;

            if (p.vy > 12) p.vy = 12;

            p.x += p.vx;
            if (p.x < 0) { p.x = 0; p.vx = 0; } 
            if (p.x > 1960) { p.x = 1960; p.vx = 0; } 

            for (let box of LEVEL.platforms) {
              if (p.x < box.x + box.w && p.x + p.w > box.x && p.y < box.y + box.h && p.y + p.h > box.y) {
                if (p.vx > 0) p.x = box.x - p.w;
                else if (p.vx < 0) p.x = box.x + box.w;
                p.vx = 0;
              }
            }

            p.y += p.vy;
            p.isGrounded = false;
            for (let box of LEVEL.platforms) {
              if (p.x < box.x + box.w && p.x + p.w > box.x && p.y < box.y + box.h && p.y + p.h > box.y) {
                if (p.vy > 0) { 
                  p.y = box.y - p.h;
                  p.isGrounded = true;
                } else if (p.vy < 0) { 
                  p.y = box.y + box.h;
                }
                p.vy = 0;
              }
            }
            
            if (p.y > 1000) {
               p.x = 50; p.y = 600; p.vx = 0; p.vy = 0;
            }

            if (keysRef.current.up && p.isGrounded) {
              p.vy = jumpForce;
              p.isGrounded = false;
            }

            let emChanged = false;
            for (let em of emeraldsRef.current) {
              if (!em.collected && p.x < em.x + 30 && p.x + p.w > em.x && p.y < em.y + 30 && p.y + p.h > em.y) {
                em.collected = true;
                emChanged = true;
                const emNode = document.getElementById(`emerald-${em.id}`);
                if (emNode) emNode.style.opacity = '0'; 
              }
            }
            
            if (emChanged) {
              const count = emeraldsRef.current.filter(e => e.collected).length;
              scoreRef.current = count;
              setEmeraldsCount(count); 
            }

            if (scoreRef.current >= 5) {
              const d = LEVEL.door;
              if (p.x < d.x + d.w && p.x + p.w > d.x && p.y < d.y + d.h && p.y + p.h > d.y) {
                setGameState('won'); 
                return; 
              }
            }

            if (playerDOMRef.current) {
              playerDOMRef.current.style.transform = `translate(${p.x}px, ${p.y}px)`;
              
              // Animace chození a směr otáčení panáčka
              const wrapper = document.getElementById('player-visual-wrapper');
              if (wrapper) {
                 // Jakým směrem se dívá (1 = doprava, -1 = doleva)
                 let faceDir = p.vx < -0.1 ? -1 : p.vx > 0.1 ? 1 : (wrapper.dataset.faceDir || 1);
                 wrapper.dataset.faceDir = faceDir;
                 wrapper.style.transform = `scaleX(${faceDir}) scale(0.18)`; 
                 
                 // Jestli stojí na zemi a pohybuje se, zapneme animaci chození
                 if (p.isGrounded && Math.abs(p.vx) > 0.5) {
                    wrapper.classList.add('is-walking');
                 } else {
                    wrapper.classList.remove('is-walking');
                 }
              }
            }
            if (worldRef.current) {
              const cameraX = Math.max(0, Math.min(p.x - window.innerWidth / 3, 2000 - window.innerWidth));
              
              // NOVINKA: Kamera nyní sleduje hráče i svisle (hlavně kvůli mobilům na šířku).
              // Výpočet zajistí, že panáček je vždy bezpečně v zorném poli nad tlačítky.
              const cameraY = p.y - window.innerHeight * 0.55; 
              
              worldRef.current.style.transform = `translate(${-cameraX}px, ${-cameraY}px)`;
            }

            requestRef.current = requestAnimationFrame(gameLoop);
          };

          useEffect(() => {
            if (gameState === 'playing') {
              requestRef.current = requestAnimationFrame(gameLoop);
            }
            return () => cancelAnimationFrame(requestRef.current);
          }, [gameState]);


          // Vykreslení postavičky (Hranatá Minecraft grafika)
          const renderCharacter = () => {
            const skins = {
              steve: { skin: '#d2b48c', shirtDefault: '#00aaaa', pantsDefault: '#4a4a9c' },
              alex:  { skin: '#f3c5a3', shirtDefault: '#6a9c4a', pantsDefault: '#784a21' },
              koala: { skin: '#a0a0a0', shirtDefault: '#b0b0b0', pantsDefault: '#909090' }
            };

            const currentSkin = skins[character];
            const currentHat = wardrobe.hats.find(h => h.id === hat);
            const currentHatColor = currentHat?.color;
            const currentShirtColor = wardrobe.shirts.find(s => s.id === shirt)?.color;
            const currentShoesColor = wardrobe.shoes.find(s => s.id === shoes)?.color;

            const displayShirt = currentShirtColor === 'transparent' ? currentSkin.shirtDefault : currentShirtColor;
            const displayShoes = currentShoesColor === 'transparent' ? currentSkin.pantsDefault : currentShoesColor;

            return (
              <div className="relative flex flex-col items-center justify-center w-64 h-[350px] mx-auto transition-all duration-300">
                
                {/* HLAVA (Hranatá 80x80) */}
                <div className="relative z-20 w-[80px] h-[80px] shadow-sm" style={{ backgroundColor: currentSkin.skin }}>
                  {hat !== 'none' && (
                    <React.Fragment>
                      {/* Vršek helmy/klobouku */}
                      <div className="absolute -top-2 -left-[2px] -right-[2px] h-[30px] z-30 shadow-sm border-b-4 border-black/20" style={{ backgroundColor: currentHatColor }} />
                      
                      {/* Boky helmy pro minecraftový vzhled */}
                      {currentHat?.id.includes('helmet') && (
                        <React.Fragment>
                          <div className="absolute top-[28px] -left-[2px] w-[15px] h-[30px] z-30 border-r-4 border-b-4 border-black/20" style={{ backgroundColor: currentHatColor }} />
                          <div className="absolute top-[28px] -right-[2px] w-[15px] h-[30px] z-30 border-l-4 border-b-4 border-black/20" style={{ backgroundColor: currentHatColor }} />
                          <div className="absolute top-[28px] left-[35px] w-[10px] h-[15px] z-30 border-b-4 border-black/20" style={{ backgroundColor: currentHatColor }} />
                        </React.Fragment>
                      )}
                    </React.Fragment>
                  )}
                  
                  {character === 'koala' ? (
                     <React.Fragment>
                       <div className="absolute -left-6 -top-2 w-[30px] h-[30px] bg-gray-400 z-10 shadow-sm" />
                       <div className="absolute -right-6 -top-2 w-[30px] h-[30px] bg-gray-400 z-10 shadow-sm" />
                       <div className="absolute top-[30px] w-full flex justify-center space-x-6 z-20">
                         <div className="w-[10px] h-[10px] bg-black" />
                         <div className="w-[10px] h-[10px] bg-black" />
                       </div>
                       <div className="w-[20px] h-[30px] bg-gray-800 absolute top-[40px] left-[30px] z-20" />
                     </React.Fragment>
                  ) : (
                     <React.Fragment>
                       {character === 'alex' && <div className="absolute top-0 left-0 w-full h-[20px] bg-orange-500 z-20 shadow-sm" />}
                       {character === 'steve' && <div className="absolute top-0 left-0 w-full h-[20px] bg-gray-800 z-20 shadow-sm" />}
                       <div className="absolute top-[40px] w-full flex justify-center space-x-4 z-20">
                         <div className="w-[15px] h-[10px] bg-white flex items-center justify-start"><div className="w-[8px] h-[10px] bg-blue-600" /></div>
                         <div className="w-[15px] h-[10px] bg-white flex items-center justify-start"><div className="w-[8px] h-[10px] bg-blue-600" /></div>
                       </div>
                     </React.Fragment>
                  )}
                </div>

                {/* TĚLO A RUCE */}
                <div className="flex z-10 relative mt-[2px]">
                  {/* Levá ruka */}
                  <div className="left-arm origin-top w-[40px] h-[120px] shadow-sm transition-colors duration-300 mr-[2px]" style={{ backgroundColor: currentSkin.skin }}>
                     {shirt !== 'none' && <div className="w-full h-[50px] shadow-sm border-b-4 border-black/10" style={{ backgroundColor: displayShirt }} />}
                  </div>
                  
                  {/* Hrudník */}
                  <div 
                    className="w-[80px] h-[120px] shadow-md transition-colors duration-300 flex items-center justify-center relative z-10 border-b-4 border-black/10"
                    style={{ backgroundColor: displayShirt }}
                  >
                  </div>

                  {/* Pravá ruka */}
                  <div className="right-arm origin-top w-[40px] h-[120px] shadow-sm transition-colors duration-300 ml-[2px]" style={{ backgroundColor: currentSkin.skin }}>
                     {shirt !== 'none' && <div className="w-full h-[50px] shadow-sm border-b-4 border-black/10" style={{ backgroundColor: displayShirt }} />}
                  </div>
                </div>

                {/* NOHY / BOTY */}
                <div className="flex z-0 relative mt-[2px]">
                  <div className="left-leg origin-top w-[40px] h-[120px] shadow-md transition-colors duration-300 relative mr-[1px]" style={{ backgroundColor: currentSkin.pantsDefault }}>
                     {shoes !== 'none' && <div className="absolute bottom-0 w-full h-[40px] border-t-4 border-black/10" style={{ backgroundColor: displayShoes }} />}
                  </div>
                  <div className="right-leg origin-top w-[40px] h-[120px] shadow-md transition-colors duration-300 relative ml-[1px]" style={{ backgroundColor: currentSkin.pantsDefault }}>
                     {shoes !== 'none' && <div className="absolute bottom-0 w-full h-[40px] border-t-4 border-black/10" style={{ backgroundColor: displayShoes }} />}
                  </div>
                </div>

              </div>
            );
          };

          // HERNÍ REŽIM
          if (gameState === 'playing') {
            return (
              <div className="fixed inset-0 bg-sky-300 overflow-hidden touch-none font-sans flex flex-col">
                <div className="absolute top-4 left-4 z-50 bg-white/90 backdrop-blur px-6 py-3 rounded-2xl shadow-lg border-2 border-emerald-200 font-bold text-xl flex items-center gap-3">
                   <span className="text-2xl animate-pulse">💎</span> {emeraldsCount} / 5
                   {emeraldsCount >= 5 && <span className="text-green-600 ml-4 animate-bounce">🚪 Dveře otevřeny!</span>}
                </div>
                
                <div className="absolute top-4 right-4 z-50">
                   <button onClick={() => setGameState('shop')} className="bg-white/90 backdrop-blur px-4 py-2 rounded-xl shadow border-2 border-gray-200 font-bold text-gray-700 active:scale-95 transition-transform">
                      Zpět
                   </button>
                </div>

                <div className="flex-1 relative">
                   <div ref={worldRef} className="absolute top-0 left-0 h-full will-change-transform" style={{ width: '2000px' }}>
                      
                      {/* Mráčky - posunuté níže do zorného pole kamery */}
                      <div className="absolute top-[300px] left-40 text-6xl opacity-50">☁️</div>
                      <div className="absolute top-[200px] left-[350px] text-8xl opacity-30">☁️</div>
                      <div className="absolute top-[350px] left-[800px] text-6xl opacity-50">☁️</div>
                      <div className="absolute top-[250px] left-[1300px] text-8xl opacity-40">☁️</div>
                      <div className="absolute top-[300px] left-[1700px] text-7xl opacity-50">☁️</div>

                      {/* Duby (stromy) */}
                      {LEVEL.trees.map(tree => (
                         <div key={`tree-${tree.id}`} className="absolute z-0 flex flex-col items-center pointer-events-none" style={{ left: tree.x, top: tree.y - 180, width: 80, height: 180 }}>
                            {/* Listí dubu */}
                            <div className="absolute top-0 w-28 h-28 bg-green-700 rounded-lg shadow-inner opacity-95 rotate-45"></div>
                            <div className="absolute top-4 -left-6 w-24 h-24 bg-green-600 rounded-lg shadow-inner opacity-95 rotate-12"></div>
                            <div className="absolute top-4 -right-6 w-24 h-24 bg-green-800 rounded-lg shadow-inner opacity-95 -rotate-12"></div>
                            <div className="absolute top-10 w-32 h-24 bg-green-600 rounded-xl shadow-inner opacity-95"></div>
                            {/* Kmen stromu */}
                            <div className="absolute bottom-0 w-10 h-24 bg-[#5c4033] rounded-t-sm border-r-8 border-black/20"></div>
                         </div>
                      ))}

                      {LEVEL.platforms.map(plat => (
                         <div key={plat.id} className="absolute shadow-sm" style={{ 
                            left: plat.x, top: plat.y, width: plat.w, height: plat.h,
                            backgroundColor: plat.type === 'grass' ? '#4ade80' : '#8b5cf6',
                            borderTop: plat.type === 'grass' ? '12px solid #22c55e' : '4px solid #7c3aed',
                            borderRadius: '8px'
                         }}>
                           {plat.type === 'grass' && <div className="w-full h-full opacity-20 bg-[url('data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHdpZHRoPSIyMCIgaGVpZ2h0PSIyMCI+PGNpcmNsZSBjeD0iMiIgY3k9IjIiIHI9IjEiIGZpbGw9IiMwMDAiLz48L3N2Zz4=')]"></div>}
                         </div>
                      ))}

                      <div className="absolute flex items-end justify-center z-0" style={{ left: LEVEL.door.x, top: LEVEL.door.y, width: LEVEL.door.w, height: LEVEL.door.h }}>
                         <div className={`w-full h-full rounded-t-lg flex flex-col items-center justify-center transition-all duration-500 border-4 border-b-0 ${emeraldsCount >= 5 ? 'bg-black border-purple-500 shadow-[0_0_30px_rgba(168,85,247,0.8)]' : 'bg-amber-800 border-amber-950'}`}>
                            {emeraldsCount < 5 ? (
                               <span className="text-4xl mb-4">🔒</span>
                            ) : (
                               <div className="w-full h-full bg-gradient-to-b from-purple-500 to-black animate-pulse rounded-t-sm opacity-80" />
                            )}
                         </div>
                      </div>

                      {emeraldsRef.current.map(em => (
                         <div id={`emerald-${em.id}`} key={em.id} className="absolute text-3xl animate-bounce drop-shadow-md z-10 transition-opacity duration-200" style={{ left: em.x, top: em.y }}>
                            💎
                         </div>
                      ))}

                      <div ref={playerDOMRef} className="absolute will-change-transform z-20 flex justify-center items-end" style={{ width: 40, height: 60, transform: 'translate(50px, 600px)' }}>
                         <div id="player-visual-wrapper" className="origin-bottom flex justify-center pointer-events-none transition-transform" style={{ transform: 'scaleX(1) scale(0.18)', width: 200 }}>
                            {renderCharacter()}
                         </div>
                      </div>
                   </div>
                </div>

                {/* Ovládání pro dotykové obrazovky (joystick a skok) - překrývá svět - optimalizováno pro mobily a landscape */}
                <div className="absolute bottom-0 left-0 right-0 h-32 md:h-44 landscape:h-24 bg-gradient-to-t from-black/30 to-transparent flex items-end pb-4 md:pb-8 landscape:pb-2 justify-between px-4 md:px-16 landscape:px-8 z-50 select-none pointer-events-none">
                   <div className="flex gap-2 md:gap-8 landscape:gap-4 pointer-events-auto">
                      <button 
                         onPointerDown={(e) => { e.preventDefault(); keysRef.current.left = true; }}
                         onPointerUp={(e) => { e.preventDefault(); keysRef.current.left = false; }}
                         onPointerLeave={() => keysRef.current.left = false}
                         className="w-16 h-16 md:w-24 md:h-24 landscape:w-16 landscape:h-16 bg-white/90 backdrop-blur rounded-full shadow-xl flex items-center justify-center text-3xl md:text-4xl landscape:text-3xl active:bg-gray-200 active:scale-90 transition-transform"
                      >
                         ⬅️
                      </button>
                      <button 
                         onPointerDown={(e) => { e.preventDefault(); keysRef.current.right = true; }}
                         onPointerUp={(e) => { e.preventDefault(); keysRef.current.right = false; }}
                         onPointerLeave={() => keysRef.current.right = false}
                         className="w-16 h-16 md:w-24 md:h-24 landscape:w-16 landscape:h-16 bg-white/90 backdrop-blur rounded-full shadow-xl flex items-center justify-center text-3xl md:text-4xl landscape:text-3xl active:bg-gray-200 active:scale-90 transition-transform"
                      >
                         ➡️
                      </button>
                   </div>
                   
                   <div className="pointer-events-auto">
                      <button 
                         onPointerDown={(e) => { e.preventDefault(); keysRef.current.up = true; }}
                         onPointerUp={(e) => { e.preventDefault(); keysRef.current.up = false; }}
                         onPointerLeave={() => keysRef.current.up = false}
                         className="w-20 h-20 md:w-28 md:h-28 landscape:w-20 landscape:h-20 bg-blue-500 rounded-full shadow-xl border-4 border-white flex items-center justify-center text-4xl md:text-5xl landscape:text-3xl active:bg-blue-600 active:scale-90 transition-transform text-white"
                      >
                         ⬆️
                      </button>
                   </div>
                </div>
              </div>
            );
          }

          // OBRAZOVKA VÍTĚZSTVÍ
          if (gameState === 'won') {
            return (
              <div className="min-h-screen bg-gradient-to-br from-green-300 to-emerald-600 flex flex-col items-center justify-center font-sans p-4 text-center text-white">
                 <div className="text-6xl md:text-8xl landscape:text-5xl mb-6 md:mb-8 landscape:mb-2 animate-bounce">🎉</div>
                 <h1 className="text-4xl md:text-5xl landscape:text-3xl font-black mb-4 drop-shadow-lg">Úroveň Dokončena!</h1>
                 <p className="text-lg md:text-2xl landscape:text-base mb-8 md:mb-12 landscape:mb-4 font-medium opacity-90 px-4">Zvládl jsi posbírat všechny emeraldy a najít dveře.</p>
                 
                 <div className="flex justify-center transform scale-50 landscape:scale-[0.35] mb-8 landscape:mb-2">
                    {renderCharacter()}
                 </div>

                 <button 
                    onClick={() => setGameState('shop')}
                    className="bg-white text-emerald-600 px-6 py-3 md:px-8 md:py-4 landscape:py-2 landscape:px-6 rounded-full font-bold text-xl md:text-2xl landscape:text-lg shadow-xl hover:bg-gray-50 active:scale-95 transition-all"
                 >
                    Zpět do obchodu
                 </button>
              </div>
            );
          }

          // KROK 1: VÝBĚR POSTAVY (Mobilní zobrazení v jednom řádku + Landscape fix)
          if (gameState === 'character_select') {
             return (
               <div className="min-h-screen bg-[url('https://www.transparenttextures.com/patterns/wood-pattern.png')] bg-emerald-700 flex flex-col font-sans selection:bg-blue-300 items-center justify-center p-2 md:p-4 landscape:p-2">
                 <div className="bg-white/90 backdrop-blur-md p-4 md:p-8 landscape:p-4 landscape:py-2 rounded-2xl md:rounded-3xl shadow-2xl text-center max-w-4xl w-full border-4 md:border-8 border-emerald-900 flex flex-col items-center justify-center landscape:max-h-[95vh] overflow-y-auto">
                   <h1 className="text-3xl md:text-5xl landscape:text-3xl font-black text-gray-800 tracking-tight mb-1 md:mb-2 landscape:mb-1 uppercase drop-shadow-sm">
                     Kdo jsi?
                   </h1>
                   <p className="text-sm md:text-xl landscape:text-sm text-gray-600 font-medium mb-4 md:mb-8 landscape:mb-2">Vyber si svého hrdinu před vstupem do obchodu!</p>
                   
                   <div className="grid grid-cols-3 gap-2 md:gap-6 landscape:gap-4 mb-6 md:mb-10 landscape:mb-4 w-full max-w-2xl mx-auto">
                     {characters.map(char => (
                       <button
                         key={char.id}
                         onClick={() => setCharacter(char.id)}
                         className={`relative overflow-hidden flex flex-col items-center p-2 md:p-6 landscape:p-2 rounded-xl md:rounded-2xl border-4 md:border-8 transition-all transform hover:-translate-y-1 md:hover:-translate-y-2 hover:shadow-xl ${
                           character === char.id ? 'border-emerald-500 bg-emerald-50 scale-105 shadow-2xl' : 'border-gray-200 bg-white shadow-md'
                         }`}
                       >
                         {character === char.id && <div className="absolute top-1 md:top-4 right-1 md:right-4 text-sm md:text-3xl animate-bounce">✅</div>}
                         <div className={`w-14 h-14 md:w-32 md:h-32 landscape:w-16 landscape:h-16 rounded-full flex items-center justify-center text-3xl md:text-7xl landscape:text-4xl shadow-inner mb-2 md:mb-4 landscape:mb-1 ${char.bgColor}`}>
                           {char.id === 'koala' ? '🐨' : char.id === 'alex' ? '👩' : '👨'}
                         </div>
                         <span className="text-sm md:text-3xl landscape:text-base font-black text-gray-700">{char.name}</span>
                       </button>
                     ))}
                   </div>

                   <button 
                     onClick={() => setGameState('shop')}
                     className="w-full md:w-auto bg-gradient-to-r from-amber-500 to-orange-500 hover:from-amber-600 hover:to-orange-600 text-white text-xl md:text-2xl landscape:text-lg font-black py-4 md:py-5 landscape:py-2 px-8 md:px-16 rounded-2xl shadow-[0_6px_0_rgb(194,65,12)] md:shadow-[0_8px_0_rgb(194,65,12)] transform transition active:translate-y-2 active:shadow-none flex items-center justify-center mx-auto gap-2 md:gap-4"
                   >
                     Jít do obchodu 🛒
                   </button>
                 </div>
               </div>
             );
          }

          // KROK 2: OBCHOD (Upraveno pro menší displeje + Landscape (otočeno na bok))
          return (
            <div className="h-screen bg-sky-100 flex flex-col font-sans selection:bg-blue-300 overflow-hidden">
              <header className="bg-amber-800 text-amber-50 p-3 md:p-4 landscape:p-2 shadow-md text-center border-b-4 md:border-b-8 border-amber-950 flex justify-between items-center shrink-0">
                <button onClick={() => setGameState('character_select')} className="bg-amber-700 hover:bg-amber-600 px-3 py-1.5 md:px-4 md:py-2 landscape:py-1 rounded-lg font-bold text-xs md:text-base">⬅️ <span className="hidden sm:inline">Změnit</span></button>
                <h1 className="text-lg md:text-3xl landscape:text-xl font-extrabold tracking-tight">
                  🛒 Vesnický Obchod
                </h1>
                <div className="w-16 md:w-32"></div>
              </header>

              <main className="flex-1 flex flex-col md:flex-row landscape:flex-row w-full mx-auto p-2 md:p-4 landscape:p-2 gap-2 md:gap-6 landscape:gap-4 min-h-0">
                
                {/* Zrcadlo (Vlevo/Nahoře) */}
                <div className="bg-white rounded-2xl md:rounded-t-full md:rounded-b-3xl landscape:rounded-2xl shadow-md md:shadow-xl w-full md:w-[350px] landscape:w-[220px] p-3 md:p-6 landscape:p-3 flex flex-row md:flex-col landscape:flex-col items-center justify-between md:justify-start landscape:justify-start border-4 md:border-8 border-gray-300 relative shrink-0 gap-4 md:gap-0 landscape:gap-2">
                  <div className="absolute inset-0 opacity-10 bg-[radial-gradient(circle_at_center,_var(--tw-gradient-stops))] from-blue-300 via-transparent to-transparent rounded-2xl md:rounded-t-full md:rounded-b-3xl landscape:rounded-2xl" />
                  
                  {/* Pevný boxík pro zmenšené zrcadlo aby nerozbil layout */}
                  <div className="w-[100px] h-[140px] md:w-[200px] md:h-[280px] landscape:w-[120px] landscape:h-[160px] relative shrink-0 flex justify-center z-10">
                      <div className="transform scale-[0.4] md:scale-75 landscape:scale-[0.45] origin-top absolute top-0">
                         {renderCharacter()}
                      </div>
                  </div>

                  <div className="mt-0 md:mt-auto landscape:mt-auto w-full md:pt-8 landscape:pt-2 z-10 flex-1 landscape:flex-none flex flex-col justify-center">
                    <button 
                      onClick={() => {
                        playerRef.current = { x: 50, y: 600, vx: 0, vy: 0, w: 40, h: 60, isGrounded: false };
                        keysRef.current = { left: false, right: false, up: false };
                        emeraldsRef.current = LEVEL.emeralds.map(e => ({...e})); 
                        scoreRef.current = 0;
                        setEmeraldsCount(0);
                        setGameState('playing');
                      }}
                      className="w-full bg-gradient-to-r from-green-500 to-emerald-600 hover:from-green-600 hover:to-emerald-700 text-white text-xl md:text-2xl landscape:text-lg font-black py-4 landscape:py-2 rounded-xl shadow-[0_4px_0_rgb(4,120,87)] md:shadow-[0_6px_0_rgb(4,120,87)] landscape:shadow-[0_4px_0_rgb(4,120,87)] transform transition active:translate-y-2 active:shadow-none flex items-center justify-center gap-2"
                    >
                      Jít hrát! ➔
                    </button>
                  </div>
                </div>

                {/* Poličky v obchodě (Vpravo/Dole) */}
                <div className="bg-[url('https://www.transparenttextures.com/patterns/wood-pattern.png')] bg-amber-100 rounded-2xl md:rounded-3xl shadow-inner md:shadow-2xl flex-1 flex flex-col overflow-hidden border-4 md:border-8 border-amber-900 p-2 md:p-6 landscape:p-2 min-h-0 relative">
                  
                  <div className="flex-1 overflow-y-auto pr-2 custom-scrollbar pb-10 absolute inset-2 md:inset-6 landscape:inset-2">
                    
                    {/* Věšáky s klobouky */}
                    <div className="mb-6 md:mb-8 landscape:mb-4">
                      <div className="flex items-center gap-2 md:gap-3 mb-1 md:mb-2">
                         <span className="text-xl md:text-3xl landscape:text-xl">🧢</span>
                         <h3 className="text-sm md:text-2xl landscape:text-sm font-black text-amber-900 uppercase">Klobouky a Helmy</h3>
                      </div>
                      <div className="bg-amber-900/10 p-2 md:p-4 rounded-t-xl border-4 border-b-0 border-amber-900/30 flex gap-2 md:gap-4 overflow-x-auto snap-x">
                         {wardrobe.hats.map(item => (
                           <button key={item.id} onClick={() => setHat(item.id)} className={`snap-center shrink-0 w-20 h-20 md:w-32 md:h-32 landscape:w-20 landscape:h-20 rounded-lg md:rounded-xl flex flex-col items-center justify-center gap-1 md:gap-2 border-2 md:border-4 transition-all ${hat === item.id ? 'border-amber-500 bg-amber-50 shadow-lg scale-105' : 'border-amber-900/20 bg-white hover:bg-amber-50'}`}>
                             <div className="w-8 h-8 md:w-12 md:h-12 landscape:w-8 landscape:h-8 shadow-sm border-2 border-black/10 flex items-center justify-center relative transform md:scale-100 scale-75 origin-center" style={{ backgroundColor: item.color === 'transparent' ? '#f3f4f6' : item.color }}>
                               {item.id === 'none' && <span className="absolute text-lg md:text-2xl">❌</span>}
                               {item.id.includes('helmet') && <div className="absolute top-2 w-full h-4 border-b-4 border-black/20"></div>}
                             </div>
                             <span className="font-bold text-amber-950 text-center text-[10px] md:text-xs px-1 leading-tight">{item.name}</span>
                           </button>
                         ))}
                      </div>
                      <div className="w-full h-4 md:h-8 bg-amber-800 rounded-b-lg shadow-[0_5px_5px_rgba(0,0,0,0.3)] md:shadow-[0_10px_10px_rgba(0,0,0,0.3)] border-b-4 border-amber-950 relative">
                         <div className="absolute -bottom-2 md:-bottom-4 left-4 md:left-8 w-2 h-4 md:w-4 md:h-6 bg-amber-900 clip-triangle"></div>
                         <div className="absolute -bottom-2 md:-bottom-4 right-4 md:right-8 w-2 h-4 md:w-4 md:h-6 bg-amber-900 clip-triangle"></div>
                      </div>
                    </div>

                    {/* Stojany na brnění a bundy */}
                    <div className="mb-6 md:mb-8 landscape:mb-4 mt-8 md:mt-12 landscape:mt-6">
                      <div className="flex items-center gap-2 md:gap-3 mb-1 md:mb-2">
                         <span className="text-xl md:text-3xl landscape:text-xl">👕</span>
                         <h3 className="text-sm md:text-2xl landscape:text-sm font-black text-amber-900 uppercase">Brnění a Bundy</h3>
                      </div>
                      <div className="bg-amber-900/10 p-2 md:p-4 rounded-t-xl border-4 border-b-0 border-amber-900/30 flex gap-2 md:gap-4 overflow-x-auto snap-x">
                         {wardrobe.shirts.map(item => (
                           <button key={item.id} onClick={() => setShirt(item.id)} className={`snap-center shrink-0 w-20 h-20 md:w-32 md:h-32 landscape:w-20 landscape:h-20 rounded-lg md:rounded-xl flex flex-col items-center justify-center gap-1 md:gap-2 border-2 md:border-4 transition-all ${shirt === item.id ? 'border-amber-500 bg-amber-50 shadow-lg scale-105' : 'border-amber-900/20 bg-white hover:bg-amber-50'}`}>
                             <div className="w-8 h-10 md:w-12 md:h-16 landscape:w-8 landscape:h-10 shadow-sm border-2 border-black/10 flex items-center justify-center relative mt-1 md:mt-2 transform md:scale-100 scale-75 origin-center" style={{ backgroundColor: item.color === 'transparent' ? '#f3f4f6' : item.color }}>
                               {item.id === 'none' && <span className="absolute text-lg md:text-2xl">❌</span>}
                               {item.id !== 'none' && <div className="absolute -top-2 md:-top-3 w-12 md:w-20 h-3 md:h-4 border-t-4 border-gray-400 rounded-t-full"></div>}
                             </div>
                             <span className="font-bold text-amber-950 text-center text-[10px] md:text-xs px-1 leading-tight">{item.name}</span>
                           </button>
                         ))}
                      </div>
                      <div className="w-full h-4 md:h-8 bg-amber-800 rounded-b-lg shadow-[0_5px_5px_rgba(0,0,0,0.3)] md:shadow-[0_10px_10px_rgba(0,0,0,0.3)] border-b-4 border-amber-950 relative">
                         <div className="absolute -bottom-2 md:-bottom-4 left-4 md:left-8 w-2 h-4 md:w-4 md:h-6 bg-amber-900 clip-triangle"></div>
                         <div className="absolute -bottom-2 md:-bottom-4 right-4 md:right-8 w-2 h-4 md:w-4 md:h-6 bg-amber-900 clip-triangle"></div>
                      </div>
                    </div>

                    {/* Poličky na boty */}
                    <div className="mb-6 md:mb-8 landscape:mb-4 mt-8 md:mt-12 landscape:mt-6">
                      <div className="flex items-center gap-2 md:gap-3 mb-1 md:mb-2">
                         <span className="text-xl md:text-3xl landscape:text-xl">🥾</span>
                         <h3 className="text-sm md:text-2xl landscape:text-sm font-black text-amber-900 uppercase">Boty a Holínky</h3>
                      </div>
                      <div className="bg-amber-900/10 p-2 md:p-4 rounded-t-xl border-4 border-b-0 border-amber-900/30 flex gap-2 md:gap-4 overflow-x-auto snap-x items-end">
                         {wardrobe.shoes.map(item => (
                           <button key={item.id} onClick={() => setShoes(item.id)} className={`snap-center shrink-0 w-20 h-20 md:w-32 md:h-32 landscape:w-20 landscape:h-20 rounded-lg md:rounded-xl flex flex-col items-center justify-end pb-1 md:pb-2 gap-1 md:gap-2 border-2 md:border-4 transition-all ${shoes === item.id ? 'border-amber-500 bg-amber-50 shadow-lg scale-105' : 'border-amber-900/20 bg-white hover:bg-amber-50'}`}>
                             <div className="flex gap-1 relative transform md:scale-100 scale-75 origin-bottom">
                               {item.id === 'none' && <span className="absolute text-lg md:text-2xl -top-4 md:-top-6 left-1/2 -translate-x-1/2 z-10">❌</span>}
                               <div className="w-4 h-5 md:w-6 md:h-8 landscape:w-4 landscape:h-5 shadow-sm border-2 border-black/10" style={{ backgroundColor: item.color === 'transparent' ? '#f3f4f6' : item.color }}></div>
                               <div className="w-4 h-5 md:w-6 md:h-8 landscape:w-4 landscape:h-5 shadow-sm border-2 border-black/10" style={{ backgroundColor: item.color === 'transparent' ? '#f3f4f6' : item.color }}></div>
                             </div>
                             <span className="font-bold text-amber-950 text-center text-[10px] md:text-xs px-1 mt-1 md:mt-2 leading-tight">{item.name}</span>
                           </button>
                         ))}
                      </div>
                      <div className="w-full h-4 md:h-8 bg-amber-800 rounded-b-lg shadow-[0_5px_5px_rgba(0,0,0,0.3)] md:shadow-[0_10px_10px_rgba(0,0,0,0.3)] border-b-4 border-amber-950 relative">
                         <div className="absolute -bottom-2 md:-bottom-4 left-4 md:left-8 w-2 h-4 md:w-4 md:h-6 bg-amber-900 clip-triangle"></div>
                         <div className="absolute -bottom-2 md:-bottom-4 right-4 md:right-8 w-2 h-4 md:w-4 md:h-6 bg-amber-900 clip-triangle"></div>
                      </div>
                    </div>

                  </div>
                </div>

              </main>
              <style dangerouslySetInnerHTML={{__html: `
                .clip-triangle { clip-path: polygon(0 0, 100% 0, 50% 100%); }
                .custom-scrollbar::-webkit-scrollbar { height: 12px; width: 12px; }
                .custom-scrollbar::-webkit-scrollbar-track { background: rgba(120,53,15,0.1); border-radius: 8px; }
                .custom-scrollbar::-webkit-scrollbar-thumb { background: rgba(120,53,15,0.5); border-radius: 8px; border: 3px solid transparent; background-clip: padding-box; }
                .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: rgba(120,53,15,0.8); border: 3px solid transparent; background-clip: padding-box; }
              `}} />
            </div>
          );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
