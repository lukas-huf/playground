<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Výuka Hodin</title>
    
    <!-- Tailwind CSS z CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- React a ReactDOM z CDN -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    
    <!-- Babel pro překlad JSX v prohlížeči -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
        /* Zabrání nechtěnému scrollování a pull-to-refresh na dotykových zařízeních */
        body {
            overscroll-behavior-y: contain;
            user-select: none;
            -webkit-user-select: none;
            touch-action: none;
            overflow: hidden;
        }
        #root {
            height: 100dvh;
            width: 100vw;
        }
        svg {
            touch-action: none; /* Pro plynulé tažení ručiček na tabletu */
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useRef, useEffect } = React;

        // --- IKONY ---
        const CheckIcon = () => (
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className="w-5 h-5 sm:w-7 sm:h-7"><polyline points="20 6 9 17 4 12"></polyline></svg>
        );
        const PlayIcon = () => (
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className="w-4 h-4 sm:w-6 sm:h-6"><polygon points="5 3 19 12 5 21 5 3"></polygon></svg>
        );
        const TrophyIcon = () => (
            <svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className="text-yellow-400 mb-4 animate-bounce"><path d="M6 9H4.5a2.5 2.5 0 0 1 0-5H6"></path><path d="M18 9h1.5a2.5 2.5 0 0 0 0-5H18"></path><path d="M4 22h16"></path><path d="M10 14.66V17c0 .55-.47.98-.97 1.21C7.85 18.75 7 20.24 7 22"></path><path d="M14 14.66V17c0 .55.47.98.97 1.21C15.15 18.75 16 20.24 16 22"></path><path d="M18 2H6v7a6 6 0 0 0 12 0V2Z"></path></svg>
        );

        // --- PIXEL ART KOMPONENTA PRO ODMĚNU (Fallback) ---
        const FallbackCreeper = () => (
          <svg viewBox="0 0 8 8" className="w-full h-full" shapeRendering="crispEdges">
            <rect width="8" height="8" fill="#53C268" />
            <rect x="1" y="2" width="2" height="2" fill="#000000" />
            <rect x="5" y="2" width="2" height="2" fill="#000000" />
            <rect x="3" y="4" width="2" height="3" fill="#000000" />
            <rect x="2" y="5" width="1" height="2" fill="#000000" />
            <rect x="5" y="5" width="1" height="2" fill="#000000" />
          </svg>
        );

        // Seznam obrázků ze složky. Program z nich náhodně vybírá.
        const EXTERNAL_IMAGES = [
            './images/1.png',
            './images/2.png',
            './images/3.png',
            './images/4.png',
            './images/5.png'
        ];

        // Komponenta pro bezpečné načtení obrázku s Fallbackem
        const RewardDisplay = ({ imagePath }) => {
          const [status, setStatus] = useState('loading'); 
          
          useEffect(() => {
            if (!imagePath) {
              setStatus('error');
              return;
            }
            
            setStatus('loading');
            const img = new Image();
            img.onload = () => setStatus('success');
            img.onerror = () => setStatus('error');
            img.src = imagePath;
          }, [imagePath]);

          // Pokud se obrázek načítá nebo nelze načíst, ukazujeme SVG Creepera
          if (status === 'loading' || status === 'error') {
            return <FallbackCreeper />;
          }

          return (
            <img 
              src={imagePath} 
              alt="Odměna" 
              className="w-full h-full object-cover animate-in fade-in duration-300" 
            />
          );
        };

        // --- HLAVNÍ APLIKACE ---
        function App() {
          const specificTimes = [
            { h: 14, m: 40 }, { h: 8, m: 15 }, { h: 8, m: 36 }, { h: 18, m: 55 },
            { h: 13, m: 40 }, { h: 9, m: 23 }, { h: 16, m: 48 }, { h: 20, m: 12 }
          ];

          const generateRandomTime = () => {
            if (Math.random() < 0.3) {
              return specificTimes[Math.floor(Math.random() * specificTimes.length)];
            }
            const h = Math.floor(Math.random() * 24);
            let m = Math.floor(Math.random() * 60);
            while ([0, 15, 30, 45].includes(m)) {
              m = Math.floor(Math.random() * 60);
            }
            return { h, m };
          };

          const [targetTime, setTargetTime] = useState({ h: 14, m: 40 });
          const [hands, setHands] = useState({ h: 0, m: 0 });
          const [blocksRevealed, setBlocksRevealed] = useState(Array(9).fill(false));
          const [message, setMessage] = useState({ text: 'Nastav správný čas!', type: 'neutral' });
          const [isLevelComplete, setIsLevelComplete] = useState(false);
          
          const [currentImagePath, setCurrentImagePath] = useState(() => {
              return EXTERNAL_IMAGES.length > 0 
                  ? EXTERNAL_IMAGES[Math.floor(Math.random() * EXTERNAL_IMAGES.length)] 
                  : null;
          });

          const svgRef = useRef(null);
          const isDragging = useRef(false);

          useEffect(() => {
            const time = generateRandomTime();
            setTargetTime(time);
            setHands({ h: Math.floor(Math.random() * 12), m: Math.floor(Math.random() * 60) });
          }, []); // Inicializace pouze při prvním spuštění

          const handlePointerDown = (e) => {
            if (!svgRef.current) return;
            const rect = svgRef.current.getBoundingClientRect();
            const cx = rect.width / 2;
            const cy = rect.height / 2;
            
            let clientX, clientY;
            if (e.touches && e.touches.length > 0) {
              clientX = e.touches[0].clientX;
              clientY = e.touches[0].clientY;
            } else {
              clientX = e.clientX;
              clientY = e.clientY;
            }
            
            if (clientX === undefined) return;

            const x = clientX - rect.left - cx;
            const y = clientY - rect.top - cy;
            const distance = Math.sqrt(x * x + y * y);
            
            const relativeDistance = distance / cx; 
            isDragging.current = relativeDistance < 0.45 ? 'hour' : 'minute';
            
            updateHandAngle(clientX, clientY, rect, cx, cy);
          };

          const handlePointerMove = (e) => {
            if (!isDragging.current || !svgRef.current) return;
            if (e.cancelable) e.preventDefault(); 
            
            const rect = svgRef.current.getBoundingClientRect();
            const cx = rect.width / 2;
            const cy = rect.height / 2;
            
            let clientX, clientY;
            if (e.touches && e.touches.length > 0) {
              clientX = e.touches[0].clientX;
              clientY = e.touches[0].clientY;
            } else {
              clientX = e.clientX;
              clientY = e.clientY;
            }
            
            if (clientX !== undefined) {
              updateHandAngle(clientX, clientY, rect, cx, cy);
            }
          };

          const handlePointerUp = () => {
            isDragging.current = false;
          };

          const updateHandAngle = (clientX, clientY, rect, cx, cy) => {
            const x = clientX - rect.left - cx;
            const y = clientY - rect.top - cy;
            let angle = (Math.atan2(y, x) * 180) / Math.PI + 90;
            if (angle < 0) angle += 360;

            if (isDragging.current === 'minute') {
              const newMinute = Math.round(angle / 6) % 60;
              setHands(prev => ({ ...prev, m: newMinute === 60 ? 0 : newMinute }));
            } else if (isDragging.current === 'hour') {
              const newHour = Math.round(angle / 30) % 12;
              setHands(prev => ({ ...prev, h: newHour === 12 ? 0 : newHour }));
            }
          };

          const checkTime = () => {
            const targetH12 = targetTime.h % 12;
            const normalizedTargetH = targetH12 === 0 ? 0 : targetH12;
            const normalizedHandsH = hands.h === 12 ? 0 : hands.h;
            
            const isCorrect = (normalizedTargetH === normalizedHandsH) && (targetTime.m === hands.m);

            if (isCorrect) {
              setMessage({ text: 'Výborně! Rozbila jsi blok!', type: 'success' });
              
              const hiddenIndices = blocksRevealed.map((rev, i) => rev ? null : i).filter(i => i !== null);
              if (hiddenIndices.length > 0) {
                const randomIndex = hiddenIndices[Math.floor(Math.random() * hiddenIndices.length)];
                const newBlocks = [...blocksRevealed];
                newBlocks[randomIndex] = true;
                setBlocksRevealed(newBlocks);

                if (hiddenIndices.length === 1) {
                  setIsLevelComplete(true);
                  setMessage({ text: 'Obrázek je kompletní!', type: 'success' });
                } else {
                  setTimeout(() => {
                    setTargetTime(generateRandomTime());
                    setMessage({ text: 'Nastav další čas.', type: 'neutral' });
                  }, 1500);
                }
              }
            } else {
              setMessage({ text: 'To není úplně přesně. Zkus to znovu!', type: 'error' });
            }
          };

          const nextLevel = () => {
            setBlocksRevealed(Array(9).fill(false));
            setIsLevelComplete(false);
            setTargetTime(generateRandomTime());
            setHands({ h: Math.floor(Math.random() * 12), m: Math.floor(Math.random() * 60) });
            setCurrentImagePath(EXTERNAL_IMAGES.length > 0 
                ? EXTERNAL_IMAGES[Math.floor(Math.random() * EXTERNAL_IMAGES.length)] 
                : null);
            setMessage({ text: 'Nová úroveň! Nastav čas.', type: 'neutral' });
          };

          const formatTime = (h, m) => `${h.toString().padStart(2, '0')}:${m.toString().padStart(2, '0')}`;

          return (
            <div className="h-full w-full bg-slate-100 font-sans p-1 sm:p-2 flex flex-col items-center select-none overflow-hidden"
                 onPointerUp={handlePointerUp}
                 onPointerLeave={handlePointerUp}
                 onTouchEnd={handlePointerUp}>
              
              <header className="flex-none mb-1 sm:mb-2 w-full max-w-5xl flex flex-col items-center">
                <h1 className="hidden sm:block text-xl sm:text-2xl md:text-4xl font-bold text-slate-800 mb-1">Kolik je hodin?</h1>
                <div className="flex flex-row w-full gap-2 justify-center items-stretch">
                  <div className="sm:hidden flex-none bg-slate-800 text-white font-mono text-xl sm:text-2xl px-3 rounded-lg shadow-inner border-2 border-slate-900 tracking-wider flex items-center justify-center">
                    {formatTime(targetTime.h, targetTime.m)}
                  </div>
                  <div className={`flex-1 w-full p-1 sm:p-2 rounded-lg sm:rounded-xl border-2 font-medium text-xs sm:text-sm md:text-xl transition-colors flex items-center justify-center text-center
                    ${message.type === 'success' ? 'bg-green-100 border-green-400 text-green-800' : 
                      message.type === 'error' ? 'bg-red-100 border-red-400 text-red-800' : 
                      'bg-white border-slate-300 text-slate-700'}`}>
                    {message.text}
                  </div>
                </div>
              </header>

              <main className="flex-1 min-h-0 flex flex-row gap-1 sm:gap-6 w-full max-w-5xl justify-center items-stretch pb-1">
                
                {/* LEVÁ STRANA */}
                <section className="flex-1 min-h-0 flex flex-col items-center justify-start bg-white p-1.5 sm:p-4 rounded-xl sm:rounded-3xl shadow-lg border-2 sm:border-4 border-slate-200">
                  <div className="hidden sm:flex flex-none bg-slate-800 text-white font-mono text-4xl md:text-6xl py-2 px-6 rounded-2xl shadow-inner border-4 border-slate-900 tracking-wider mb-4 items-center justify-center">
                    {formatTime(targetTime.h, targetTime.m)}
                  </div>

                  <div className="flex-1 min-h-0 w-full flex justify-center items-center">
                    <svg 
                      ref={svgRef}
                      viewBox="0 0 300 300"
                      className="cursor-pointer aspect-square h-full max-w-full"
                      onPointerDown={handlePointerDown}
                      onPointerMove={handlePointerMove}
                      onTouchStart={handlePointerDown}
                      onTouchMove={handlePointerMove}
                    >
                      <circle cx="150" cy="150" r="140" fill="white" stroke="#334155" strokeWidth="8" />
                      
                      {Array.from({ length: 60 }).map((_, i) => {
                        const angle = (i * 6 * Math.PI) / 180;
                        const isHour = i % 5 === 0;
                        const r1 = isHour ? 115 : 125;
                        const r2 = 135;
                        const x1 = 150 + r1 * Math.sin(angle);
                        const y1 = 150 - r1 * Math.cos(angle);
                        const x2 = 150 + r2 * Math.sin(angle);
                        const y2 = 150 - r2 * Math.cos(angle);
                        return (
                          <line key={i} x1={x1} y1={y1} x2={x2} y2={y2} 
                                stroke={isHour ? "#1e293b" : "#94a3b8"} 
                                strokeWidth={isHour ? "4" : "2"} />
                        );
                      })}

                      {Array.from({ length: 12 }).map((_, i) => {
                        const hour = i === 0 ? 12 : i;
                        const angle = (i * 30 * Math.PI) / 180;
                        const r = 95;
                        const x = 150 + r * Math.sin(angle);
                        const y = 150 - r * Math.cos(angle);
                        return (
                          <text key={i} x={x} y={y} fontSize="24" fontWeight="bold" fill="#334155"
                                textAnchor="middle" dominantBaseline="central">
                            {hour}
                          </text>
                        );
                      })}

                      <g transform={`rotate(${(hands.h + hands.m / 60) * 30} 150 150)`}>
                        <line x1="150" y1="150" x2="150" y2="80" stroke="#0f172a" strokeWidth="12" strokeLinecap="round" />
                      </g>

                      <g transform={`rotate(${hands.m * 6} 150 150)`}>
                        <line x1="150" y1="150" x2="150" y2="40" stroke="#ef4444" strokeWidth="8" strokeLinecap="round" />
                      </g>

                      <circle cx="150" cy="150" r="10" fill="#0f172a" />
                      <circle cx="150" cy="150" r="4" fill="#ef4444" />
                    </svg>
                  </div>
                  
                  <p className="hidden sm:block text-center text-slate-500 mt-1 text-[10px] sm:text-xs font-medium">Táhni prstem za ručičky</p>
                </section>

                {/* PRAVÁ STRANA */}
                <section className="flex-1 min-h-0 flex flex-col items-center justify-between">
                  <div className="flex-1 min-h-0 w-full flex justify-center items-center">
                    <div className="relative aspect-square h-full max-w-full rounded-lg sm:rounded-xl md:rounded-2xl overflow-hidden shadow-lg sm:shadow-xl md:shadow-2xl border-4 md:border-8 border-slate-700 bg-black">
                      
                      <div className="absolute inset-0">
                        <RewardDisplay imagePath={currentImagePath} />
                      </div>

                      <div className="absolute inset-0 grid grid-cols-3 grid-rows-3">
                        {blocksRevealed.map((isRevealed, index) => (
                          <div 
                            key={index} 
                            className={`transition-opacity duration-500 ease-out ${isRevealed ? 'opacity-0' : 'opacity-100'}`}
                            style={{
                              backgroundColor: '#7A5C46',
                              borderTop: 'clamp(4px, 2vh, 16px) solid #5C8727',
                              boxShadow: 'inset -2px -2px 0px rgba(0,0,0,0.15), inset 2px 0px 0px rgba(255,255,255,0.05)'
                            }}
                          />
                        ))}
                      </div>

                      {isLevelComplete && (
                        <div className="absolute inset-0 flex flex-col items-center justify-center bg-black/60 backdrop-blur-sm animate-in fade-in duration-500">
                          <TrophyIcon />
                          <h2 className="text-white text-lg sm:text-xl md:text-3xl font-bold mb-2 md:mb-6 text-center px-2">Skvělá práce!</h2>
                          <button 
                            onClick={nextLevel}
                            className="bg-green-500 hover:bg-green-600 text-white font-bold py-2 px-3 md:py-3 md:px-6 rounded-lg sm:rounded-xl text-xs sm:text-lg md:text-xl flex items-center gap-1 sm:gap-2 shadow-lg"
                          >
                            <PlayIcon />
                            <span className="hidden sm:inline">Další obrázek</span>
                            <span className="sm:hidden">Další</span>
                          </button>
                        </div>
                      )}
                    </div>
                  </div>
                  
                  <div className="flex-none w-full max-w-[400px] flex flex-col items-center mt-2 sm:mt-4">
                    <button 
                      onClick={checkTime}
                      disabled={isLevelComplete}
                      className="w-full bg-blue-500 hover:bg-blue-600 active:bg-blue-700 text-white font-bold py-2 sm:py-3 md:py-4 px-2 rounded-lg sm:rounded-xl text-sm sm:text-lg md:text-xl flex items-center justify-center gap-1 sm:gap-2 shadow-lg transition-transform active:scale-95 disabled:opacity-50"
                    >
                      <CheckIcon />
                      <span>Zkontrolovat</span>
                    </button>
                    <div className="mt-1 sm:mt-2 text-[10px] sm:text-xs md:text-base text-slate-500 font-medium">
                      Odhaleno: {blocksRevealed.filter(Boolean).length} / 9
                    </div>
                  </div>
                </section>

              </main>
            </div>
          );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
