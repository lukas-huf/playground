<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Gyro Kuličky - Kolize</title>
    <style>
        body { margin: 0; overflow: hidden; background: #0f172a; font-family: sans-serif; touch-action: none; }
        canvas { display: block; }
        #overlay {
            position: fixed; inset: 0; background: rgba(15, 23, 42, 0.95);
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            color: white; z-index: 100; text-align: center; padding: 20px;
        }
        button {
            padding: 15px 40px; font-size: 1.2rem; background: #38bdf8;
            color: #0f172a; border: none; border-radius: 50px; cursor: pointer;
            font-weight: bold; box-shadow: 0 4px 15px rgba(56, 189, 248, 0.4);
        }
    </style>
</head>
<body>
    <div id="overlay">
        <h1>Fyzikální Kuličky 🔵</h1>
        <p>Nakloň mobil pro pohyb.<br>Ťukni pro novou kuličku.<br>Kuličky se nyní odrážejí od sebe!</p>
        <button id="start">SPUSTIT</button>
    </div>
    <canvas id="canvas"></canvas>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const startBtn = document.getElementById('start');
        
        let balls = [];
        let gravity = { x: 0, y: 0 };
        let draggedBall = null;
        let lastPos = { x: 0, y: 0 };

        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resize);
        resize();

        class Ball {
            constructor(x, y) {
                this.x = x; 
                this.y = y;
                this.radius = 15 + Math.random() * 15;
                this.color = `hsl(${Math.random() * 360}, 80%, 60%)`;
                this.vx = 0; 
                this.vy = 0;
                this.mass = this.radius; // Hmotnost závisí na velikosti
                this.isDragging = false;
            }

            draw() {
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
                let grad = ctx.createRadialGradient(this.x - this.radius * 0.3, this.y - this.radius * 0.3, 2, this.x, this.y, this.radius);
                grad.addColorStop(0, '#fff'); 
                grad.addColorStop(0.3, this.color); 
                grad.addColorStop(1, '#000');
                ctx.fillStyle = grad; 
                ctx.fill();
            }

            update() {
                if (this.isDragging) return;
                
                // Přidání gravitace
                this.vx += gravity.x; 
                this.vy += gravity.y;
                
                // Tření (vzduch/povrch)
                this.vx *= 0.98; 
                this.vy *= 0.98;
                
                this.x += this.vx; 
                this.y += this.vy;

                // Odrazy od stěn
                if (this.x + this.radius > canvas.width) { 
                    this.x = canvas.width - this.radius; 
                    this.vx *= -0.6; 
                } else if (this.x - this.radius < 0) { 
                    this.x = this.radius; 
                    this.vx *= -0.6; 
                }
                
                if (this.y + this.radius > canvas.height) { 
                    this.y = canvas.height - this.radius; 
                    this.vy *= -0.6; 
                } else if (this.y - this.radius < 0) { 
                    this.y = this.radius; 
                    this.vy *= -0.6; 
                }
            }
        }

        // Funkce pro řešení kolizí mezi dvěma kuličkami
        function resolveCollision(b1, b2) {
            const dx = b2.x - b1.x;
            const dy = b2.y - b1.y;
            const distance = Math.hypot(dx, dy);
            const minDistance = b1.radius + b2.radius;

            if (distance < minDistance) {
                // 1. Vyřešení překryvu (odtlačení kuliček od sebe)
                const overlap = minDistance - distance;
                const nx = dx / distance; // Normálový vektor x
                const ny = dy / distance; // Normálový vektor y
                
                const moveX = nx * overlap / 2;
                const moveY = ny * overlap / 2;

                if (!b1.isDragging) { b1.x -= moveX; b1.y -= moveY; }
                if (!b2.isDragging) { b2.x += moveX; b2.y += moveY; }

                // 2. Výpočet odrazu (zachování hybnosti)
                // Relativní rychlost
                const rvx = b2.vx - b1.vx;
                const rvy = b2.vy - b1.vy;
                
                // Rychlost ve směru normály
                const velAlongNormal = rvx * nx + rvy * ny;

                // Pokud se kuličky už pohybují od sebe, nic nedělej
                if (velAlongNormal > 0) return;

                // Koeficient pružnosti (0.1 až 1)
                const restitution = 0.5;

                // Výpočet impulsu
                let j = -(1 + restitution) * velAlongNormal;
                j /= (1 / b1.mass + 1 / b2.mass);

                // Aplikace impulsu
                const impulseX = j * nx;
                const impulseY = j * ny;

                if (!b1.isDragging) {
                    b1.vx -= impulseX / b1.mass;
                    b1.vy -= impulseY / b1.mass;
                }
                if (!b2.isDragging) {
                    b2.vx += impulseX / b2.mass;
                    b2.vy += impulseY / b2.mass;
                }
            }
        }

        canvas.addEventListener('pointerdown', e => {
            let hit = balls.find(b => Math.hypot(b.x - e.clientX, b.y - e.clientY) < b.radius);
            if (hit) {
                draggedBall = hit; hit.isDragging = true;
                lastPos = { x: e.clientX, y: e.clientY };
            } else {
                balls.push(new Ball(e.clientX, e.clientY));
            }
        });

        window.addEventListener('pointermove', e => {
            if (draggedBall) {
                draggedBall.vx = (e.clientX - lastPos.x);
                draggedBall.vy = (e.clientY - lastPos.y);
                draggedBall.x = e.clientX;
                draggedBall.y = e.clientY;
                lastPos = { x: e.clientX, y: e.clientY };
            }
        });

        window.addEventListener('pointerup', () => {
            if (draggedBall) { draggedBall.isDragging = false; draggedBall = null; }
        });

        startBtn.onclick = () => {
            if (typeof DeviceOrientationEvent !== 'undefined' && typeof DeviceOrientationEvent.requestPermission === 'function') {
                DeviceOrientationEvent.requestPermission().then(p => {
                    if (p === 'granted') window.addEventListener('deviceorientation', e => {
                        // Citlivost gyroskopu
                        gravity.x = e.gamma * 0.08; 
                        gravity.y = e.beta * 0.08;
                    });
                });
            } else {
                window.addEventListener('deviceorientation', e => {
                    gravity.x = e.gamma * 0.08; 
                    gravity.y = e.beta * 0.08;
                });
            }
            document.getElementById('overlay').remove();
            
            (function loop() {
                ctx.fillStyle = '#0f172a'; 
                ctx.fillRect(0, 0, canvas.width, canvas.height);

                // Kontrola kolizí mezi všemi kuličkami
                for (let i = 0; i < balls.length; i++) {
                    for (let j = i + 1; j < balls.length; j++) {
                        resolveCollision(balls[i], balls[j]);
                    }
                }

                balls.forEach(b => { 
                    b.update(); 
                    b.draw(); 
                });
                requestAnimationFrame(loop);
            })();
        };
    </script>
</body>
</html>
